<!doctype html>
<html lang=""p->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container container--flex-column">
        <img class="header__logo" src="./images/logotipo.svg" alt="" />
        <h1 class="header__title">Contact Form</h1>
        <p class="header__text">
          Insira os dados do contato e clique em cadastrar!
        </p>
      </div>
    </header>

    <main>
      <div class="container">
        <form class="contact-form" action="">
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="nome">Nome</label>
            </div>
            <div class="contact-form__col-b">
              <input
                class="contact-form__input contact-form__input--metade"
                name="nome"
                id="nome"
                placeholder="Nome"
                type="text"
              />
              <input
                class="contact-form__input contact-form__input--metade"
                name="sobrenome"
                id="sobrenome"
                placeholder="Sobrenome"
                type="text"
              />
            </div>
          </div>
          
          
          
          <!-- criar a linha do e-mail -->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="email">Email</label>
            </div>
            <div class="contact-form__col-b">
              <input
                class="contact-form__input contact-form__input--inteiro"
                name="email"
                id="email"
                placeholder="E-mail"
                type="text"
              />
            </div>
          </div>
          
          
          
          
          <!-- Telefone-->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="telefone">Telefone</label>
            </div>
            <div class="contact-form__col-b">
              <input
                class="contact-form__input contact-form__input--terco"
                name="pais"
                id="pais"
                placeholder="+55"
                type="number"
              />
              <input
                class="contact-form__input contact-form__input--terco"
                name="ddd"
                id="ddd"
                placeholder="ddd"
                type="number"
              />
              <input
                class="contact-form__input contact-form__input--terco"
                name="telefone"
                id="telefone"
                placeholder="Ex: 99999-9999"
                type="number"
              />
            </div>
          </div>


          <!-- Endereço 1-->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="telefone">Endereço</label>
            </div>
            <div class="contact-form__col-b">
              <input
                class="contact-form__input contact-form__input--quarto"
                name="cep"
                id="cep"
                placeholder="cep: 9999-999"
                type="number"
              />
              <input
                class="contact-form__input contact-form__input--metade"
                name="endereco"
                id="endereco"
                placeholder="Rua lá de casa"
                type="text"
              />
              <input
                class="contact-form__input contact-form__input--quarto"
                name="numero"
                id="numero"
                placeholder="Ex: ex: 555"
                type="number"
              />
            </div>
          </div>



           <!-- Endereço 2 -->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="telefone"></label>
            </div>
            <div class="contact-form__col-b">
              <input
                class="contact-form__input contact-form__input--terco"
                name="pais"
                id="pais"
                placeholder="+55"
                type="number"
              />
              <input
                class="contact-form__input contact-form__input--terco"
                name="ddd"
                id="ddd"
                placeholder="ddd"
                type="number"
              />
              <input
                class="contact-form__input contact-form__input--terco"
                name="telefone"
                id="telefone"
                placeholder="Ex: 99999-9999"
                type="number"
              />
            </div>
          </div>



        <!-- Endereço 3 -->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="telefone"></label>
            </div>
            <div class="contact-form__col-b">
              <input
                class="contact-form__input contact-form__input--terco"
                name="pais"
                id="pais"
                placeholder="+55"
                type="number"
              />
             
            </div>
          </div>


        <!-- Endereço 3 -->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="telefone">Anotações</label>
            </div>
            <div class="contact-form__col-b">
              <textarea 
                class="contact-form__textarea"  
                name="anotacoes" 
                id="anotacoes" placeholder="Anotações"
              ></textarea>
             
            </div>
          </div>
        
          <!-- Botões -->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
            </div>
            <div class="contact-form__col-b">
             <button 
                type="button"
                id="cadastrar"
                name="cadastrar"
                class="contact-form__button contact-form__input--metade"
              >Cadastrar</button>
             <button 
                type="reset"
                id="limpar"
                name="limpar"
                class="contact-form__button contact-form__input--metade"
             >Limpar</button>
            </div>
          </div>

        </form>
      </div>
    </main>
  </body>
</html>
