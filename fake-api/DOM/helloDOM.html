<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
</head>
<body>
    <kaua id="titulo">Professor, Kauã presente</kaua>

    <p>Hello DOM JS</p>
    <button onclick="saudacao();">Click em Mim</button><br>
    <button ondblclick="mouseClicadoDuasVezes();">Click 2 vezes</button><br>
    <button onmousedown="saudacao();">Click em Mim</button><br>
    <button onmouseup="saudacao();">Click em Mim</button><br>
    <button onmouseover="saudacaoLegal();">Passe o Mouse</button><br>


     <script>
        alert(`Chamada: ${document.getElementById("titulo").textContent}`);

        // JavaScritp é uma linguagem Case Sensitive
        // por convenção, utilizamos o padrão Camel Case 
        //  - Maiúsculo a partir da segunda palavra
        function saudacao(){
            alert("Hellow World!");
        }
        function saudacaoLegal(){
            alert("Olá amigo!");
        }
        function mouseClicadoDuasVezes(){
            alert("Mouse Clicado 2 vezes!");
        }
    </script>
</body>
</html>
